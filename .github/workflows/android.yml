name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install
        working-directory: ./project/mobile_app

      - name: Build Web Assets for Mobile
        run: python3 build_mobile.py
        working-directory: ./project

      - name: Sync Capacitor Android
        run: npx cap sync android
        working-directory: ./project/mobile_app

      - name: Build Android APK
        run: ./gradlew assembleDebug
        working-directory: ./project/mobile_app/android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookOfElisha-Android
          path: ./project/mobile_app/android/app/build/outputs/apk/debug/app-debug.apk
