name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Android App Code
        run: |
          # Create web directory for the app
          mkdir -p www
          cp -r assets audio timings index.html book.css book.js www/ || true
          
          # Inject Background Audio functionality
          echo "document.addEventListener('DOMContentLoaded', () => { if (window.Capacitor && window.Capacitor.Plugins.BackgroundMode) { window.Capacitor.Plugins.BackgroundMode.enable(); } });" >> www/book.js
          
          # Install Mobile App Software on the Server
          npm init -y
          npm install @capacitor/core@8.3.2 @capacitor/android@8.3.2 @capacitor/cli@8.3.2 @anuradev/capacitor-background-mode@7.2.1
          
          # Configure App Settings
          echo '{
            "appId": "org.bookofelisha.app",
            "appName": "Book of Elisha",
            "webDir": "www",
            "bundledWebRuntime": false
          }' > capacitor.config.json
          
          # Generate Android Project
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BookOfElisha-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
